<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>我的智慧極簡衣櫥</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 800px; margin: auto; }
        .clothing-item {
            margin-bottom: 20px; padding-bottom: 15px;
            border-bottom: 1px dashed #ccc; list-style-type: none;
            display: flex; align-items: center; justify-content: space-between;
        }
        .clothing-info { flex-grow: 1; }
        .clothing-img { max-width: 100px; display: block; margin-top: 10px; border-radius: 8px; }
        .add-form { background-color: #f9f9f9; padding: 20px; border-radius: 8px; margin-bottom: 30px; }
        input { margin-bottom: 10px; padding: 5px; }
        .btn-delete { background-color: #ff4d4d; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; }
        .btn-add { background-color: #4CAF50; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>👗 我的智慧極簡衣櫥 (完整 CRUD 版)</h1>

    <!-- 🌟 新增衣服的表單 (這會把資料送到 /add) -->
    <div class="add-form">
        <h3>➕ 買新衣服了！加入衣櫥</h3>
        <form action="/add" method="POST">
            名稱：<input type="text" name="name" required placeholder="例如：純白 T 恤"><br>
            種類：<input type="text" name="category" required placeholder="例如：上衣"><br>
            顏色：<input type="text" name="color" placeholder="例如：白色"><br>
            圖片網址：<input type="text" name="image_url" placeholder="貼上圖片連結 (可選)"><br>
            <button type="submit" class="btn-add">放入衣櫥</button>
        </form>
    </div>

    <ul>
        {% for item in items %}
            <li class="clothing-item">
                <div class="clothing-info">
                    <strong>{{ item.name }}</strong> 
                    (種類: {{ item.category }} | 顏色: {{ item.color }})
                    
                    {% if item.image_url %}
                        <img src="{{ item.image_url }}" class="clothing-img">
                    {% else %}
                        <p style="color: gray; font-size: 0.9em;">這件衣服還沒有照片喔！</p>
                    {% endif %}
                </div>

                <!-- 🌟 刪除按鈕 (這會觸發 /delete/這件衣服的ID) -->
                <form action="/delete/{{ item.id }}" method="POST" onsubmit="return confirm('確定要把這件衣服丟掉嗎？');">
                    <button type="submit" class="btn-delete">🗑️ 丟掉</button>
                </form>
            </li>
        {% endfor %}
    </ul>
</body>
</html>
